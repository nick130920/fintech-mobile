workflows:
  android-workflow:
    name: Android Workflow
    max_build_duration: 120
    triggering:
          events:
              - push
          cancel_previous_builds: true
    instance_type: mac_mini_m1
    environment:
      android_signing:
        - keystore_moneyflow
      groups:
        - google_play # <-- (Includes GCLOUD_SERVICE_ACCOUNT_CREDENTIALS)
        # Opcional: grupo con SENTRY_DSN (secure) si no lo defines a nivel de app/equipo
      vars:
        CM_CLONE_DEPTH: 100
        # GlitchTip/Sentry: crea SENTRY_DSN en Codemagic (App settings → Environment variables,
        # Secure: sí). No commitees el DSN en este archivo.
        SENTRY_ENVIRONMENT: production
        PACKAGE_NAME: "com.money.flow" # <-- Put your package name here
        GOOGLE_PLAY_TRACK: internal # <-- Any of the following: internal, alpha, beta, production
        CM_KEYSTORE_ALIAS: "upload"
        CM_KEYSTORE_PASSWORD: "nicolas1309"
        FREECURRENCY_API_KEY: "fca_live_e5ILZOXiYU8BqiF5A6doBO3J1l7Y1uZem8M0hAz2" # FreeCurrency API Key
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up local.properties
        script: |
          echo "flutter.sdk=$HOME/programs/flutter" > "$CM_BUILD_DIR/money_flow/android/local.properties"
      - name: Get Flutter packages
        script: |
          cd money_flow
          flutter packages pub get
      - name: Generate release notes
        script: |
          git fetch --all --tags

          PREV_TAG=$(git for-each-ref --sort=-creatordate --format '%(refname:short)' refs/tags | sed -n 2p)
          if [ -n "$PREV_TAG" ]; then
            RANGE="$PREV_TAG..HEAD"
          else
            RANGE="HEAD~20..HEAD"
          fi

          ES_TRAILERS=$(git log "$RANGE" --format=%B | sed -n 's/^RN-es:[[:space:]]*//p')
          EN_TRAILERS=$(git log "$RANGE" --format=%B | sed -n 's/^RN-en:[[:space:]]*//p')

          if [ -n "$ES_TRAILERS" ]; then
            ES_NOTES=$(echo "$ES_TRAILERS" | sed 's/^/- /')
          else
            ES_NOTES=$(git log "$RANGE" --pretty=format:"- %s")
          fi

          if [ -n "$EN_TRAILERS" ]; then
            EN_NOTES=$(echo "$EN_TRAILERS" | sed 's/^/- /')
          else
            EN_NOTES=$(git log "$RANGE" --pretty=format:"- %s")
          fi

          if [ -z "$ES_NOTES" ]; then
            ES_NOTES="- Mejoras internas y correcciones menores."
          fi
          if [ -z "$EN_NOTES" ]; then
            EN_NOTES="- Internal improvements and minor bug fixes."
          fi

          {
            echo "Build: $CM_BUILD_ID"
            echo "Commit: $CM_COMMIT"
            echo
            echo "$ES_NOTES"
          } > release_notes_es-ES.txt

          {
            echo "Build: $CM_BUILD_ID"
            echo "Commit: $CM_COMMIT"
            echo
            echo "$ES_NOTES"
          } > release_notes_es-419.txt

          {
            echo "Build: $CM_BUILD_ID"
            echo "Commit: $CM_COMMIT"
            echo
            echo "$EN_NOTES"
          } > release_notes_en-US.txt
      - name: Flutter analyze
        script: |
          cd money_flow
          flutter analyze
        ignore_failure: true
      - name: Flutter unit tests
        script: |
          cd money_flow
          flutter test
        ignore_failure: true
      - name: Build AAB with Flutter
        script: |
          cd money_flow
          BUILD_NUMBER=$(($(google-play get-latest-build-number --package-name "$PACKAGE_NAME" --tracks="$GOOGLE_PLAY_TRACK") + 1))
          flutter build appbundle --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$BUILD_NUMBER \
            --dart-define=FREECURRENCY_API_KEY=$FREECURRENCY_API_KEY \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=SENTRY_RELEASE="money_flow@1.0.${BUILD_NUMBER}+${BUILD_NUMBER}"
    artifacts:
      - money_flow/build/**/outputs/**/*.aab
      - money_flow/build/**/outputs/**/mapping.txt
      - money_flow/flutter_drive.log
    publishing:
      # See the following link for details about email publishing - https://docs.codemagic.io/publishing-yaml/distribution/#email
      email:
        recipients:
          - namc1309@gmail.com
        notify:
          success: true # To not receive a notification when a build succeeds
          failure: true # To not receive a notification when a build fails
      google_play:
        credentials: $GCLOUD_SERVICE_ACCOUNT_CREDENTIALS
        track: $GOOGLE_PLAY_TRACK
        submit_as_draft: false

  ios-workflow:
    name: iOS Workflow
    max_build_duration: 120
    instance_type: mac_mini_m1
    integrations:
      app_store_connect: codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.money.flow
      vars:
        SENTRY_ENVIRONMENT: production
        APP_ID: 1555555551 # <-- Put the app id number here. This is found in App Store Connect > App > General > App Information
        FREECURRENCY_API_KEY: "fca_live_e5ILZOXiYU8BqiF5A6doBO3J1l7Y1uZem8M0hAz2" # FreeCurrency API Key
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Get Flutter packages
        script: |
          cd money_flow
          flutter packages pub get
      - name: Install pods
        script: |
          cd money_flow
          find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze
        script: |
          cd money_flow
          flutter analyze
        ignore_failure: true
      - name: Flutter unit tests
        script: |
          cd money_flow
          flutter test
        ignore_failure: true
      - name: Flutter build ipa and automatic versioning
        script: |
          cd money_flow
          IOS_BUILD=$(($(app-store-connect get-latest-app-store-build-number "$APP_ID") + 1))
          flutter build ipa --release \
            --build-name=1.0.$BUILD_NUMBER \
            --build-number=$IOS_BUILD \
            --dart-define=FREECURRENCY_API_KEY=$FREECURRENCY_API_KEY \
            --dart-define=SENTRY_DSN="$SENTRY_DSN" \
            --dart-define=SENTRY_ENVIRONMENT="$SENTRY_ENVIRONMENT" \
            --dart-define=SENTRY_RELEASE="money_flow@1.0.${BUILD_NUMBER}+${IOS_BUILD}"
    artifacts:
      - money_flow/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - money_flow/flutter_drive.log
    publishing:
      # See the following link for details about email publishing - https://docs.codemagic.io/publishing-yaml/distribution/#email
      email:
        recipients:
          - namc1309@gmail.com
        notify:
          success: true
          failure: true
      app_store_connect:
        auth: integration
        
        # Configuration related to TestFlight (optional)
        # Note: This action is performed during post-processing.
        submit_to_testflight: false
        beta_groups: # Specify the names of beta tester groups that will get access to the build once it has passed beta review.
          - group name 1
          - group name 2

        # Configuration related to App Store (optional)
        # Note: This action is performed during post-processing.
        submit_to_app_store: false
